services:
  chroma:
    image: chromadb/chroma:latest
    container_name: incidentrag-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: incidentrag-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION=rag_chunks
      - CHUNKS_PATH=corpus/chunks.jsonl
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - TOP_K=5
      - SIMILARITY_THRESHOLD=0.55
    depends_on:
      - chroma

volumes:
  chroma_data: